<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Gestión de Películas</title>
    <link rel="stylesheet" href="estilos.css">
</head>
<body>

    <div class="contenedor">

        <h1>🎬 Sistema de Gestión de Películas</h1>

        <form id="formPelicula">

            <input type="hidden" id="idPelicula">

            <div class="grupo">
                <label>Título</label>
                <input type="text" id="titulo">
            </div>

            <div class="grupo">
                <label>Director</label>
                <input type="text" id="director">
            </div>

            <div class="grupo">
                <label>Año</label>
                <input type="number" id="anio">
            </div>

            <div class="grupo">
                <label>Categoría</label>
                <select id="categoria">
                    <option value="">Seleccione...</option>
                    <option value="Acción">Acción</option>
                    <option value="Comedia">Comedia</option>
                    <option value="Drama">Drama</option>
                    <option value="Terror">Terror</option>
                </select>
            </div>

            <button type="submit">Guardar Película</button>

        </form>

        <hr>

        <div class="filtros">

            <input type="text"
                   id="buscar"
                   placeholder="Buscar por título...">

            <select id="filtroCategoria">
                <option value="Todas">Todas</option>
                <option value="Acción">Acción</option>
                <option value="Comedia">Comedia</option>
                <option value="Drama">Drama</option>
                <option value="Terror">Terror</option>
            </select>

        </div>

        <h3>Total Películas: <span id="contador">0</span></h3>

        <table>

            <thead>
                <tr>
                    <th>Título</th>
                    <th>Director</th>
                    <th>Año</th>
                    <th>Categoría</th>
                    <th>Acciones</th>
                </tr>
            </thead>

            <tbody id="tablaPeliculas">

            </tbody>

        </table>

    </div>

    <script src="script.js"></script>

</body>
</html>
